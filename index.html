<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京东业务助手 - 王煮粥出品</title>
    <style>
        :root {
            --jd-red: #e1251b;
            --bg-color: #f7f8fa;
            --text-main: #333;
            --text-sub: #999;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 600px; }

        /* 输入卡片 */
        .card-header {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 20px;
            text-align: center;
        }

        .card-header h1 { margin: 0 0 10px; font-size: 20px; font-weight: 600; }
        .card-header p { margin: 0 0 20px; font-size: 13px; color: var(--text-sub); }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        input {
            width: 100%;
            max-width: 300px;
            padding: 14px;
            border: 1px solid #e1e1e1;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            outline: none;
            text-align: center;
            letter-spacing: 1px;
        }
        input:focus { border-color: var(--jd-red); box-shadow: 0 0 0 3px rgba(225, 37, 27, 0.1); }

        .btn-confirm {
            padding: 12px 40px;
            background-color: var(--jd-red);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-confirm:active { transform: scale(0.98); }

        /* 二维码展示区 */
        .qr-section { 
            display: none; 
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .qr-wrapper {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            flex: 1;
            min-width: 260px;
            max-width: 280px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .step-badge {
            background-color: rgba(225, 37, 27, 0.08);
            color: var(--jd-red);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .step-desc { font-size: 15px; font-weight: 500; margin-bottom: 15px; }

        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 85%;
            max-width: 320px;
            text-align: center;
        }
        .modal h2 { font-size: 18px; margin: 0 0 10px; }
        .modal .id-display { font-size: 28px; color: var(--jd-red); font-weight: bold; margin: 15px 0; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; }
        .btn-cancel { background: #eee; color: #666; }
        .btn-ok { background: var(--jd-red); color: white; }
