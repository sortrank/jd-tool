<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿姨定位系统 - by 王煮粥</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --container-bg: #1b1b1b;
            --accent-color: #ff9900;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header-logo {
            font-weight: bold;
            font-size: 28px;
            margin-top: 20px;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }
        .header-logo span {
            background-color: var(--accent-color);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 2px;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
        }

        h2 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #ccc;
        }

        input[type="text"] {
            width: 85%;
            padding: 15px;
            border: 2px solid #333;
            background: #000;
            color: var(--accent-color);
            border-radius: 4px;
            outline: none;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            margin-top: 20px;
            width: 95%;
            padding: 15px;
            background-color: var(--accent-color);
            border: none;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #e68a00;
        }

        .qr-section {
            margin-top: 30px;
            display: none; 
        }

        .qr-item {
            margin-bottom: 25px;
            background: #282828;
            padding: 20px;
            border-radius: 8px;
        }

        .qr-title {
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .qrcode {
            display: flex;
            justify-content: center;
            background: #fff;
            padding: 12px;
            border-radius: 4px;
            margin: 0 auto;
            width: fit-content;
        }

        .footer {
            margin-top: 40px;
            padding-bottom: 20px;
            color: #666;
            font-size: 13px;
            text-align: center;
        }
        .footer b {
            color: #888;
        }
    </style>
</head>
<body>

    <div class="header-logo">
        AUNT<span>HUB</span>
    </div>

    <div class="container">
        <h2>请输入阿姨工号</h2>
        <input type="text" id="auntIdInput" placeholder="Aunt ID" onkeydown="if(event.keyCode==13) generateQRs()">
        <button onclick="generateQRs()">确认输入</button>

        <div id="qrResult" class="qr-section">
            <div class="qr-item">
                <div class="qr-title">扫码定位阿姨</div>
                <div id="qrcode1" class="qrcode"></div>
            </div>

            <div class="qr-item">
                <div class="qr-title">定位阿姨后扫码查询时间</div>
                <div id="qrcode2" class="qrcode"></div>
            </div>

            <div class="qr-item">
                <div class="qr-title">扫码切换查询时长</div>
                <div id="qrcode3" class="qrcode"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        by <b>王煮粥</b>，微信novilos
    </div>

    <script>
        function generateQRs() {
            const auntId = document.getElementById('auntIdInput').value.trim();
            if (!auntId) {
                alert("工号不能为空");
                return;
            }

            // 清空旧内容
            document.getElementById('qrcode1').innerHTML = "";
            document.getElementById('qrcode2').innerHTML = "";
            document.getElementById('qrcode3').innerHTML = "";
            
            // 显示结果
            document.getElementById('qrResult').style.display = 'block';

            // 1. 定位阿姨二维码 (动态链接)
            const url1 = `https://m-ls.jd.com/?jdreactkey=JDReactCleaning&jdreactapp=JDReactCleaning&sourceType=7&auntId=${auntId}&routerName=scanOptimizePage`;
            new QRCode(document.getElementById("qrcode1"), {
                text: url1,
                width: 200,
                height: 200
            });

            // 2. 查询时间二维码 (固定链接)
            const url2 = "https://m-ls.jd.com/order";
            new QRCode(document.getElementById("qrcode2"), {
                text: url2,
                width: 200,
                height: 200
            });

            // 3. 切换查询时长二维码 (固定链接 - 新增)
            const url3 = "https://pro.m.jd.com/mall/active/38NnTAS6J17a7wU2ZGvv2Uj6AAZ7/index.html";
            new QRCode(document.getElementById("qrcode3"), {
                text: url3,
                width: 200,
                height: 200
            });
            
            // 平滑滚动
            setTimeout(() => {
                window.scrollTo({ top: document.querySelector('.qr-item').offsetTop, behavior: 'smooth' });
            }, 100);
        }
    </script>
</body>
</html>
