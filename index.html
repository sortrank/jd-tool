<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿姨定位系统 - 王煮粥出品</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* Pornhub 风格配色 */
        :root {
            --bg-color: #000000;
            --container-bg: #1b1b1b;
            --accent-color: #ff9900;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 顶部 Logo 风格提示 */
        .header-logo {
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .header-logo span {
            background-color: var(--accent-color);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 4px;
        }

        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            border: 2px solid #333;
            background: #000;
            color: #fff;
            border-radius: 4px;
            outline: none;
            font-size: 16px;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        button {
            margin-top: 20px;
            width: 90%;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        .qr-section {
            margin-top: 30px;
            display: none; /* 初始隐藏 */
        }

        .qr-item {
            margin-bottom: 30px;
            background: #282828;
            padding: 15px;
            border-radius: 6px;
        }

        .qr-title {
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .qrcode {
            display: flex;
            justify-content: center;
            background: #fff;
            padding: 10px;
            border-radius: 4px;
            margin: 0 auto;
            width: fit-content;
        }

        .footer {
            margin-top: 40px;
            color: #666;
            font-size: 12px;
        }
        .footer-highlight {
            color: #999;
            border-bottom: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="header-logo">
        JD<span>CLEANING</span>
    </div>

    <div class="container">
        <h2>请输入阿姨工号</h2>
        <input type="text" id="auntIdInput" placeholder="例如: 123456">
        <button onclick="generateQRs()">确认输入</button>

        <div id="qrResult" class="qr-section">
            <div class="qr-item">
                <div class="qr-title">扫码定位阿姨</div>
                <div id="qrcode1" class="qrcode"></div>
            </div>

            <div class="qr-item">
                <div class="qr-title">定位阿姨后扫码查询时间</div>
                <div id="qrcode2" class="qrcode"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p class="footer-highlight">王煮粥出品，微信novilos</p>
    </div>

    <script>
        function generateQRs() {
            const auntId = document.getElementById('auntIdInput').value.trim();
            if (!auntId) {
                alert("请输入有效的阿姨工号");
                return;
            }

            // 清空旧的二维码
            document.getElementById('qrcode1').innerHTML = "";
            document.getElementById('qrcode2').innerHTML = "";
            
            // 显示展示区域
            document.getElementById('qrResult').style.display = 'block';

            // 链接1：替换auntId
            const url1 = `https://m-ls.jd.com/?jdreactkey=JDReactCleaning&jdreactapp=JDReactCleaning&sourceType=7&auntId=${auntId}&routerName=scanOptimizePage`;
            new QRCode(document.getElementById("qrcode1"), {
                text: url1,
                width: 180,
                height: 180
            });

            // 链接2：查询时间
            const url2 = "https://m-ls.jd.com/order";
            new QRCode(document.getElementById("qrcode2"), {
                text: url2,
                width: 180,
                height: 180
            });
        }
    </script>
</body>
</html>
