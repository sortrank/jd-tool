<!DOCTYPE html>
<html>
<head>
    <title>链接转换器</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <h2>JD 链接二维码生成器</h2>
    <input type="text" id="auntIdInput" placeholder="输入6-10位数字" maxlength="10">
    <button onclick="generate()">生成二维码</button>
    
    <div id="result" style="margin-top:20px;">
        <p id="urlText" style="word-break: break-all; color: blue;"></p>
        <div id="qrcode"></div>
    </div>

    <script>
        function generate() {
            const id = document.getElementById('auntIdInput').value;
            if(!/^\d{6,10}$/.test(id)) {
                alert("请输入6-10位数字！");
                return;
            }
            
            // 基础链接
            const baseUrl = "https://m-ls.jd.com/?jdreactkey=JDReactCleaning&jdreactapp=JDReactCleaning&sourceType=7&auntId=73628&routerName=scanOptimizePage";
            // 替换 auntId
            const newUrl = baseUrl.replace(/auntId=\d+/, "auntId=" + id);
            
            // 显示链接
            document.getElementById('urlText').innerText = newUrl;
            
            // 清除旧二维码并生成新二维码
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: newUrl,
                width: 200,
                height: 200
            });
        }
    </script>
</body>
</html>
