<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>京东业务助手 - 王煮粥出品</title>
    <script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --jd-red: #e1251b;
            --bg: #f2f5f8;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 700px; }

        .header-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            text-align: center;
        }

        h1 { margin: 0 0 10px; font-size: 24px; letter-spacing: 1px; }
        .subtitle { font-size: 14px; color: var(--text-sub); margin-bottom: 25px; }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        input {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: var(--jd-red); }

        .btn-main {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            background: var(--jd-red);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(225, 37, 27, 0.3);
            transition: transform 0.1s, background 0.2s;
        }
        .btn-main:active { transform: scale(0.97); background: #c8160d; }

        /* 二维码展示区 */
        .qr-grid { 
            display: none; 
            gap: 20px; 
            margin-top: 10px;
            width: 100%;
        }

        .qr-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .badge {
            background: rgba(225, 37, 27, 0.1);
            color: var(--jd-red);
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .qr-title { font-weight: 600; margin-bottom: 15px; font-size: 16px; }
        .qr-container { background: #fff; padding: 10px; border-radius: 10px; }

        /* 版权信息 */
        .copyright-card {
            margin-top: 50px;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .author-box { text-align: left; }
        .author-label { font-size: 10px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
        .author-name { font-size: 18px; font-weight: 800; color: #2c3e50; display: block; }
        .wechat-box { border-left: 1px solid #ddd; padding-left: 20px; }
        .wechat-id { font-family: monospace; font-size: 16px; color: var(--jd-red); font-weight: 600; }

        @media (min-width: 600px) {
            .qr-grid { display: flex; flex-direction: row; }
        }

        @media (max-width: 599px) {
            .qr-grid { display: flex; flex-direction: column; }
            .copyright-card { padding: 15px 25px; flex-direction: column; gap: 10px; border-radius: 20px; }
            .wechat-box { border-left: none; padding-left: 0; border-top: 1px solid #ddd; padding-top: 10px; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <h1>京东业务助手</h1>
        <p class="subtitle">王煮粥独家定制 · 极速查询版</p>
        <div class="input-box">
            <input type="number" id="aid" pattern="\d*" placeholder="输入阿姨 ID" onkeypress="if(event.keyCode==13) generate()">
            <button class="btn-main" onclick="generate()">查询阿姨时间</button>
        </div>
    </div>

    <div id="qrGrid" class="qr-grid">
        <div class="qr-card">
            <span class="badge">STEP 01</span>
            <div class="qr-title">扫码定位阿姨</div>
            <div id="q1" class="qr-container"></div>
        </div>
        <div class="qr-card">
            <span class="badge">STEP 02</span>
            <div class="qr-title">扫码查询时间</div>
            <div id="q2" class="qr-container"></div>
        </div>
    </div>
</div>

<div class="copyright-card">
    <div class="author-box">
        <span class="author-label">Created By</span>
        <span class="author-name">王煮粥</span>
    </div>
    <div class="wechat-box">
        <span class="author-label">WeChat Contact</span>
        <div class="wechat-id">novilos</div>
    </div>
</div>

<script>
    function generate() {
        const aid = document.getElementById('aid').value;
        
        // 修改限制：最少4位，最多10位
        if (!/^\d{4,10}$/.test(aid)) {
            alert("请输入正确的4-10位数字ID");
            return;
        }

        if (typeof QRCode === "undefined") {
            alert("正在加载插件，请稍候...");
            return;
        }

        const grid = document.getElementById('qrGrid');
        grid.style.display = 'flex';
        
        document.getElementById('q1').innerHTML = "";
        document.getElementById('q2').innerHTML = "";

        const url1 = "https://m-ls.jd.com/?jdreactkey=JDReactCleaning&jdreactapp=JDReactCleaning&sourceType=7&auntId=" + aid + "&routerName=scanOptimizePage";
        const url2 = "https://m-ls.jd.com/order";

        new QRCode(document.getElementById("q1"), { text: url1, width: 200, height: 200, colorDark: "#2c3e50" });
        new QRCode(document.getElementById("q2"), { text: url2, width: 200, height: 200, colorDark: "#2c3e50" });

        setTimeout(() => {
            window.scrollTo({ top: grid.offsetTop - 20, behavior: 'smooth' });
        }, 100);
    }
</script>

</body>
</html>
